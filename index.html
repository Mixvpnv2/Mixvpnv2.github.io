<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatteState BlackOut</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @keyframes fadeInPage {
            from { opacity: 0; filter: brightness(0.2); }
            to { opacity: 1; filter: brightness(1); }
        }

        @keyframes fadeInModal {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        body {
            background-color: #050b05;
            color: #8ce68c;
            font-family: 'Courier Prime', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            text-shadow: 0 0 5px rgba(140, 230, 140, 0.7);
            animation: fadeInPage 1.5s ease-out forwards;
        }

        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        @keyframes crt-flicker {
            0% { opacity: 0.99; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: rgba(18, 16, 16, 0.1);
            opacity: 0;
            z-index: 2;
            pointer-events: none;
            animation: crt-flicker 0.15s infinite;
        }

        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            letter-spacing: 3px;
            border-bottom: 1px dashed rgba(140, 230, 140, 0.5);
            padding: 20px 30px 15px;
            margin-bottom: 60px;
            background-color: #050b05;
            z-index: 10;
        }

        header a {
            color: #8ce68c;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: 0.2s;
        }

        header a:hover {
            border-bottom: 1px solid #8ce68c;
            text-shadow: 0 0 10px #8ce68c;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 5;
        }

        .main-title {
            font-size: 26px;
            letter-spacing: 5px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 15px;
            letter-spacing: 2px;
            color: rgba(140, 230, 140, 0.75);
            margin-bottom: 50px;
            text-transform: lowercase;
        }

        .divider {
            width: 220px;
            border-top: 1px dashed rgba(140, 230, 140, 0.6);
            margin: 20px 0;
        }

        .menu-btn {
            background: transparent;
            border: none;
            color: #8ce68c;
            font-family: inherit;
            font-size: 22px;
            letter-spacing: 5px;
            padding: 14px 50px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
            width: 380px;
            display: flex;
            justify-content: space-between;
            text-transform: uppercase;
        }

        .menu-btn span.text {
            flex-grow: 1;
            text-align: center;
        }

        .menu-btn:hover {
            background: rgba(140, 230, 140, 0.2);
            text-shadow: 0 0 10px #8ce68c, 0 0 15px #8ce68c;
        }

        footer {
            width: 100%;
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(140, 230, 140, 0.7);
            border-top: 1px dashed rgba(140, 230, 140, 0.5);
            text-align: center;
            padding: 15px 0 20px;
            margin-top: auto;
            background-color: #050b05;
            z-index: 10;
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(5, 11, 5, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease-out;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            border: 2px solid #8ce68c;
            background: #050b05;
            padding: 40px;
            width: 90%;
            max-width: 700px;
            box-shadow: 0 0 25px rgba(140, 230, 140, 0.35);
            position: relative;
        }

        .modal.show .modal-content {
            animation: fadeInModal 0.3s ease-out forwards;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: rgba(140, 230, 140, 0.7);
            z-index: 10;
        }

        .close-btn:hover { color: #8ce68c; }

        .modal h3 {
            margin-bottom: 20px;
            font-size: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid #8ce68c;
            padding-bottom: 8px;
        }

        .pin-input {
            background: rgba(0,0,0,0.6);
            border: 1px dashed #8ce68c;
            color: #8ce68c;
            font-family: inherit;
            font-size: 24px;
            padding: 10px;
            text-align: center;
            letter-spacing: 8px;
            outline: none;
            text-shadow: 0 0 4px #8ce68c;
            margin: 20px auto;
            display: block;
        }

        /* разные ширины для разных полей */
        #pinInput {
            width: 160px;
        }

        #guidePinInput {
            width: 280px;
            letter-spacing: 4px;
        }

        .pin-submit {
            background: transparent;
            border: 1px solid #8ce68c;
            color: #8ce68c;
            font-family: inherit;
            font-size: 16px;
            padding: 8px 20px;
            cursor: pointer;
            display: block;
            margin: 10px auto;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.2s;
        }

        .pin-submit:hover {
            background: rgba(140,230,140,0.2);
            text-shadow: 0 0 6px #8ce68c;
        }

        .error-msg {
            color: #ff5555;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }

        .script-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px dashed rgba(140, 230, 140, 0.6);
            padding: 20px;
            font-size: 16px;
            color: #8ce68c;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">CATTESTATE</div>
        <div class="nav"><a href="https://discord.gg" target="_blank">CONTACT</a></div>
    </header>

    <div class="menu-container">
        <div class="main-title">BLACKOUT: RESURRECTION</div>
        <div class="subtitle">options</div>
        
        <div class="divider"></div>
        
        <button class="menu-btn" onclick="openScript()">
            <span>[</span><span class="text">START</span><span>]</span>
        </button>
        
        <button class="menu-btn" onclick="openPinPrompt()">
            <span>[</span><span class="text">SETTINGS</span><span>]</span>
        </button>
        
        <button class="menu-btn" onclick="openGuidePinPrompt()">
            <span>[</span><span class="text">GUIDE</span><span>]</span>
        </button>
        
        <div class="divider"></div>
    </div>

    <footer>OPERATOR PROGRAM</footer>

    <div class="modal" id="scriptModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeScript()">&times;</span>
            <h3>&gt; RETRIEVING DATA...</h3>
            <div class="script-box">1999 wasn't okay.</div>
        </div>
    </div>

    <div class="modal" id="pinModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closePinPrompt()">&times;</span>
            <h3>&gt; ENTER ACCESS CODE</h3>
            <input type="password" id="pinInput" class="pin-input" maxlength="4" placeholder="••••" autofocus>
            <button class="pin-submit" onclick="checkPin()">[ CONFIRM ]</button>
            <div class="error-msg" id="pinError">ACCESS DENIED</div>
        </div>
    </div>

    <div class="modal" id="guidePinModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeGuidePinPrompt()">&times;</span>
            <h3>&gt; ENTER GUIDE CODE</h3>
            <input type="text" id="guidePinInput" class="pin-input" maxlength="19" placeholder="XXXX-XXXX-XXXX-XXXX" autofocus>
            <button class="pin-submit" onclick="checkGuidePin()">[ CONFIRM ]</button>
            <div class="error-msg" id="guidePinError">ACCESS DENIED</div>
        </div>
    </div>

    <script>
        const SETTINGS_PIN = "4242";           
        const SETTINGS_VIDEO_URL = "https://www.youtube.com/watch?v=mTcUEboHq8Q&t=177s"; 

        const GUIDE_PIN = "1234-5678-9012-3456";
        const GUIDE_VIDEO_URL = "https://www.youtube.com/watch?v=fJuP-PxJCmY&t=348s"; 

        let audioCtx = null;
        let ambientNoise = null;
        let ambientGain = null;
        let audioInitialized = false;

        function initAudio() {
            if (audioInitialized) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioInitialized = true;
                startAmbient();
            } catch (e) {
                console.warn('Web Audio API not supported');
            }
        }

        function startAmbient() {
            if (!audioCtx) return;
            const bufferSize = 2 * audioCtx.sampleRate;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }
            ambientNoise = audioCtx.createBufferSource();
            ambientNoise.buffer = noiseBuffer;
            ambientNoise.loop = true;
            const lowpass = audioCtx.createBiquadFilter();
            lowpass.type = 'lowpass';
            lowpass.frequency.value = 120;
            lowpass.Q.value = 1;
            ambientGain = audioCtx.createGain();
            ambientGain.gain.value = 0.03;
            ambientNoise.connect(lowpass);
            lowpass.connect(ambientGain);
            ambientGain.connect(audioCtx.destination);
            ambientNoise.start();
        }

        function playClickSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.value = 800;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        }

        function playHoverSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.value = 180;
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function playStaticBurst() {
            if (!audioCtx) return;
            const duration = 0.2;
            const bufferSize = audioCtx.sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.3;
            }
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            source.connect(gain);
            gain.connect(audioCtx.destination);
            source.start();
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.body.addEventListener('click', initAudio, { once: true });
            document.body.addEventListener('mouseover', initAudio, { once: true });
            
            const buttons = document.querySelectorAll('.menu-btn');
            buttons.forEach(btn => {
                btn.addEventListener('mouseenter', playHoverSound);
                btn.addEventListener('click', playClickSound);
            });
            
            const contactLink = document.querySelector('header a');
            if (contactLink) {
                contactLink.addEventListener('mouseenter', playHoverSound);
                contactLink.addEventListener('click', playClickSound);
            }

            document.getElementById('pinInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') checkPin();
            });
            document.getElementById('guidePinInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') checkGuidePin();
            });
        });

        // ==================== MODALS LOGIC ====================

        // Script modal
        function openScript() {
            initAudio();
            const modal = document.getElementById('scriptModal');
            modal.style.display = 'flex';
            setTimeout(() => {
                modal.classList.add('show');
                playStaticBurst();
            }, 10);
        }

        function closeScript() {
            const modal = document.getElementById('scriptModal');
            modal.classList.remove('show');
            playClickSound();
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300);
        }

        // Settings PIN modal
        function openPinPrompt() {
            initAudio();
            const modal = document.getElementById('pinModal');
            document.getElementById('pinInput').value = '';
            document.getElementById('pinError').style.display = 'none';
            modal.style.display = 'flex';
            setTimeout(() => {
                modal.classList.add('show');
                document.getElementById('pinInput').focus();
                playStaticBurst();
            }, 10);
        }

        function closePinPrompt() {
            const modal = document.getElementById('pinModal');
            modal.classList.remove('show');
            playClickSound();
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300);
        }

        function checkPin() {
            const input = document.getElementById('pinInput').value.trim();
            if (input === SETTINGS_PIN) {
                closePinPrompt();
                window.open(SETTINGS_VIDEO_URL, '_blank');
            } else {
                document.getElementById('pinError').style.display = 'block';
                document.getElementById('pinInput').value = '';
                playClickSound();
            }
        }

        // Guide PIN modal
        function openGuidePinPrompt() {
            initAudio();
            const modal = document.getElementById('guidePinModal');
            document.getElementById('guidePinInput').value = '';
            document.getElementById('guidePinError').style.display = 'none';
            modal.style.display = 'flex';
            setTimeout(() => {
                modal.classList.add('show');
                document.getElementById('guidePinInput').focus();
                playStaticBurst();
            }, 10);
        }

        function closeGuidePinPrompt() {
            const modal = document.getElementById('guidePinModal');
            modal.classList.remove('show');
            playClickSound();
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300);
        }

        function checkGuidePin() {
            const input = document.getElementById('guidePinInput').value.trim();
            if (input === GUIDE_PIN) {
                closeGuidePinPrompt();
                window.open(GUIDE_VIDEO_URL, '_blank');
            } else {
                document.getElementById('guidePinError').style.display = 'block';
                document.getElementById('guidePinInput').value = '';
                playClickSound();
            }
        }

        // Close modals by clicking outside
        window.onclick = function(event) {
            const scriptModal = document.getElementById('scriptModal');
            const pinModal = document.getElementById('pinModal');
            const guidePinModal = document.getElementById('guidePinModal');
            if (event.target == scriptModal) closeScript();
            if (event.target == pinModal) closePinPrompt();
            if (event.target == guidePinModal) closeGuidePinPrompt();
        }
    </script>
</body>
</html>
