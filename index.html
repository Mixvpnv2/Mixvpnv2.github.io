<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatteState V5 Black out</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 30%, #1f2833 0%, #0b0c10 70%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Шапка сайта */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 80px;
            width: 100%;
        }

        .logo {
            font-weight: 900;
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav a {
            color: #aaaaaa;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ffffff;
        }

        .btn {
            background-color: #00a896;
            color: #ffffff;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: lowercase;
        }

        .btn:hover {
            background-color: #02c39a;
            box-shadow: 0 0 15px #00a896;
        }

        /* Главный контент */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }

        /* Уменьшенный размер главного заголовка */
        h1 {
            font-size: 48px; 
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #888888;
            font-size: 16px;
            margin-bottom: 30px;
            max-width: 600px;
        }

        /* Модальное окно со скриптом */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background-color: #14171c;
            border: 1px solid #00a896;
            border-radius: 12px;
            width: 90%;
            max-width: 650px;
            padding: 30px;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 168, 150, 0.3);
            text-align: left;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            color: #888;
            cursor: pointer;
            transition: 0.3s;
        }

        .close-btn:hover {
            color: #fff;
        }

        .modal h3 {
            margin-bottom: 15px;
            color: #00a896;
        }

        .script-box {
            background-color: #0b0c10;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            color: #02c39a;
            overflow-x: auto;
            white-space: pre-wrap;
            border: 1px solid #222;
            max-height: 300px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">CatteStateV5</div>
        <nav>
            <!-- Сюда вставьте ссылку на ваш Дискорд сервер вместо ссылки ниже -->
            <a href="https://discord.gg/NcDtuqm55w" target="_blank">Contact</a>
        </nav>
    </header>

    <main>
        <h1>CatteState V5 Black out</h1>
        <div class="subtitle">Bypass AntiCheats?</div>
        
        <button class="btn" style="padding: 15px 40px; font-size: 16px;" onclick="openScript()">script</button>
    </main>

    <div class="modal" id="scriptModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeScript()">&times;</span>
            <h3>Scripts</h3>
            <div class="script-box" id="scriptText">loadstring(game:HttpGet("https://raw.githubusercontent.com/7GrandDadPGN/VapeV4ForRoblox/main/NewMainScript.lua", true))()</div>
        </div>
    </div>

    <script>
        function openScript() {
            const modal = document.getElementById('scriptModal');
            modal.classList.add('show');
        }

        function closeScript() {
            const modal = document.getElementById('scriptModal');
            modal.classList.remove('show');
        }

        window.onclick = function(event) {
            const modal = document.getElementById('scriptModal');
            if (event.target == modal) {
                modal.classList.remove('show');
            }
        }
    </script>

</body>
</html>
